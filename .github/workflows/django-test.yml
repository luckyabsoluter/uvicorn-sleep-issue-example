name: Django Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - uses: jdx/mise-action@v4
    - name: Install Dependencies
      run: |
        uv venv
        uv pip install -r requirements.txt
    - name: Run Tests
      run: |
        uv run manage.py test
