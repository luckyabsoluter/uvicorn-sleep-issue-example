name: Django Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        requirements: [ "requirements.txt", "freeze.txt" ]

    steps:
    - uses: actions/checkout@v6
    - uses: jdx/mise-action@v4
    - name: Install Dependencies
      run: |
        uv venv
        uv pip install -r ${{ matrix.requirements }}
    - name: Run Tests
      run: |
        uv run manage.py test
